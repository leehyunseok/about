<!DOCTYPE html>
<html>
<head>
    <title>Create Placeholders</title>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <canvas id="canvas2"></canvas>
    <script>
        // Create Matterhorn placeholder
        function createMatterhorn() {
            const canvas = document.getElementById('canvas1');
            const ctx = canvas.getContext('2d');
            canvas.width = 500;
            canvas.height = 600;

            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#7dd3fc');
            skyGradient.addColorStop(1, '#a8d5ff');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Mountains
            ctx.fillStyle = '#4c5a7a';
            ctx.beginPath();
            ctx.moveTo(0, 300);
            ctx.lineTo(150, 100);
            ctx.lineTo(250, 200);
            ctx.lineTo(350, 50);
            ctx.lineTo(500, 300);
            ctx.lineTo(500, 600);
            ctx.lineTo(0, 600);
            ctx.fill();

            // Snow peaks
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(200, 180);
            ctx.lineTo(250, 80);
            ctx.lineTo(300, 180);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(320, 150);
            ctx.lineTo(350, 50);
            ctx.lineTo(380, 150);
            ctx.fill();

            // Convert to image
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'matterhorn.jpg';
                a.click();
            }, 'image/jpeg', 0.9);
        }

        // Create Alps background placeholder
        function createAlpsBackground() {
            const canvas = document.getElementById('canvas2');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200;
            canvas.height = 800;

            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#87ceeb');
            skyGradient.addColorStop(1, '#e6f3ff');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Mountains - multiple layers for depth
            ctx.fillStyle = '#5a7a9a';
            ctx.beginPath();
            ctx.moveTo(0, 500);
            ctx.quadraticCurveTo(200, 300, 400, 450);
            ctx.quadraticCurveTo(600, 250, 800, 400);
            ctx.quadraticCurveTo(1000, 300, 1200, 500);
            ctx.lineTo(1200, 800);
            ctx.lineTo(0, 800);
            ctx.fill();

            // Snow peaks
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(300, 400);
            ctx.lineTo(350, 250);
            ctx.lineTo(400, 400);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(700, 350);
            ctx.lineTo(750, 150);
            ctx.lineTo(800, 350);
            ctx.fill();

            // Convert to image
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'alps-bg.jpg';
                a.click();
            }, 'image/jpeg', 0.9);
        }

        // Run on load
        setTimeout(() => {
            createMatterhorn();
            setTimeout(() => createAlpsBackground(), 500);
        }, 100);
    </script>
</body>
</html>
